<!-- Ganti bagian kolom kanan (hero-right-content) Anda dengan kode ini -->
<div class="hero-right-content">
  <div class="promo-image-frame">
    <!-- Gambar dipasang di sini dengan nama file yang sesuai -->
    <img src="gambar 3_4.jpg" alt="Promo Utama WAWASAN4D">
  </div>
</div>

<style>
  /* Tambahkan CSS ini ke dalam tag <style> Anda */
  .hero-right-content {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .promo-image-frame {
    width: 100%;
    max-width: 450px;
    position: relative;
    padding: 10px;
    border-radius: 15px;
    /* Efek bingkai mewah gold */
    border: 3px solid transparent;
    background: linear-gradient(var(--maroon-deep), var(--maroon-deep)) padding-box, 
                linear-gradient(135deg, #f4c887, #c99a5c, #f4c887) border-box;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(244, 200, 135, 0.2);
    transition: transform 0.3s ease;
  }

  .promo-image-frame:hover {
    transform: scale(1.02);
  }

  .promo-image-frame img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
    object-fit: cover;
  }
</style>
